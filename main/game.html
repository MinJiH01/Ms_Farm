<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 화분</title>
  <link rel="stylesheet" href="../css/game.css">
</head>
<body>
  <div class="game-container">
    <h1>내 화분</h1>
    <div id="plant-container">
      <img id="plant" src="../image/검색창 장식.png" alt="plant">
    </div>
    <div class="controls">
      <button id="water-button">물 주기</button>
      <button id="sunlight-button">햇빛 주기</button>
      <button id="check-in-button">출석체크</button>
    </div>
    <p id="status">식물이 자라고 있어요...</p>
    <p id="growth">성장 상태: 0%</p>
    <p id="health">건강 상태: 100%</p>
    <p id="points">포인트: 0</p>
    <p id="water-drops">남은 물방울: 0</p>
  </div>
  <script src="../js/game.js"></script>
</body>
</html>
