<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 상세정보 - 브로콜리</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .logo img {
            vertical-align: middle;
        }
        .navbar {
            list-style: none;
            display: flex;
            gap: 15px;
        }
        .navbar a {
            color: black;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .navbar a:hover {
            color: white;
        }
        .product-details {
            display: flex;
            gap: 40px;
            padding: 40px;
            background-color: white;
            margin: 20px auto;
            max-width: 1200px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .product-image img {
            width: 100%;
            max-width: 500px;
            height: 500px; /* 고정 크기 */
            object-fit: cover; /* 이미지 비율 유지하면서 잘라내기 */
            border-radius: 10px;
        }
        .product-info {
            max-width: 600px;
        }
        .product-info h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #333;
        }
        .product-info p {
            font-size: 1rem;
            margin-bottom: 20px;
            line-height: 1.6;
            color: #666;
        }
        .product-info .price {
            font-size: 1.8rem;
            color: #43A047;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .product-info .discount {
            font-size: 1rem;
            color: #E53935 ;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .actions {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .actions .btn:hover {
            background: linear-gradient(45deg, #45a049, #388E3C);
            transform: translateY(-2px);
        }
        .actions .btn i {
            font-size: 1.2rem;
        }
        .details h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #333;
        }
        .details ul {
            list-style: disc;
            margin-left: 20px;
            font-weight: bold;
            color: #555;
        }
        footer {
            background-color: white;
            color: black;
            padding: 20px;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
        }
        .footer-box {
            margin-bottom: 20px;
        }
        .footer-box .logo {
            color: black;
            font-weight: bold;
            text-decoration: none;
        }
        .social img {
            width: 30px;
            margin: 0 5px;
        }
        .social img:hover {
            opacity: 0.8;
        }
        .copyright {
            background-color: white;
            color: black;
            padding: 10px;
            font-weight: bold;
            text-align: center;
        }
        .actions .btn {
        padding: 8px 18px; /* 버튼 크기 축소 */
        background: linear-gradient(145deg, #2df137, green); /* 부드러운 녹색-녹색 그라데이션 */
        color: white;
        border: none;
        border-radius: 5px; /* 둥근 모서리 설정 */
        cursor: pointer;
        font-size: 1rem; /* 글자 크기 */
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px; /* 아이콘과 글자 사이의 간격 축소 */
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* 부드러운 그림자 */
        transition: all 0.3s ease-in-out;
    }

    .actions .btn:hover {
        background: linear-gradient(145deg, green, #2df137); /* hover 시 그라데이션 반전 */
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2); /* 그림자 효과 강화 */
        transform: translateY(-5px); /* 약간 떠오르는 효과 */
    }

    .actions .btn:active {
        transform: translateY(0); /* 클릭 시 눌린 느낌 */
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .actions .btn i {
        font-size: 1.2rem; /* 아이콘 크기 조정 */
        margin: 0; /* 아이콘 주변의 여백 제거 */
        border-radius: 0; /* 아이콘을 둥글지 않게 설정 */
    }
        /* SNS 아이콘 수정 */
        .social {
        display: flex;
        justify-content: center; /* 아이콘을 가운데 정렬 */
        gap: 15px; /* 아이콘 사이의 간격을 설정 */
        margin-top: 10px;
    }

    .social img {
        width: 30px; /* 아이콘 크기 설정 */
        height: 30px; /* 아이콘의 높이 설정 */
        transition: opacity 0.3s ease; /* 호버 효과 부드럽게 */
    }

    .social img:hover {
        opacity: 0.8; /* 마우스를 올렸을 때 약간 투명하게 */
    }

    /* 작은 화면에서 SNS 아이콘 크기 조정 */
    @media (max-width: 768px) {
        .social img {
            width: 25px; /* 작은 화면에서는 아이콘 크기를 줄여서 표시 */
            height: 25px;
        }
    }
    
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo"><img src="../image/농부.png" width="50" height="50">MS농장</a>
        <ul class="navbar">
            <li><a href="#home">홈</a></li>
            <li><a href="#categories">카테고리</a></li>
            <li><a href="#products">전체상품</a></li>
            <li><a href="#about">회사정보</a></li>
        </ul>
        <div class="profile">
            <img src ="../image/내정보.png" class= "user-pic" onclick="toggleMenu()">
            <span>김두식</span>
            <i class="fi fi-rr-angle-small-down" onclick="toggleMenu()"></i>
        </div>
        <div class="navbar-right">
            <a href="../main/singin.html">로그인</a>
            <a href="../main/singup.html">회원가입</a>  
        </div>

         <!-- 내 정보  -->
        <div class="sub-menu-wrap" id="subMenu">
            <div class="sub-menu">
                <div class="user-info">
                    <img src="../image/내정보.png">
                    <h3>김두식</h3>
                </div>
                <hr>
                <a href="#" class="sub-menu-link">
                    <img src="../image/유저.png">
                    <p>프로필</p>
                    <span i class="fi fi-rr-arrow-right"></span>
                </a>
                <a href="#" class="sub-menu-link">
                    <img src="../image/설정.png">
                    <p>설정</p>
                    <span i class="fi fi-rr-arrow-right"></span>
                </a>
                <a href="#" class="sub-menu-link">
                    <img src="../image/안내.png">
                    <p>문의하기</p>
                    <span i class="fi fi-rr-arrow-right"></span>
                </a>
                <a href="#" class="sub-menu-link">
                    <img src="../image/로그아웃.png">
                    <p>로그아웃</p>
                    <span i class="fi fi-rr-arrow-right"></span>
                </a>

            </div>
        </div>
    </header>

    <section class="product-details">
        <div class="product-image">
            <img src="../image/브로콜리.png" alt="브로콜리">
        </div>

        <div class="product-info">
            <h1>브로콜리</h1>
            <p>신선하고 영양가가 풍부한 브로콜리! 비타민과 미네랄이 가득, 건강을 위한 필수 채소.</p>
            <h3 class="price">13,000원 <span>/kg</span></h3>
            <span class="discount">-25%</span><br><br>

            <div class="actions">
                <button class="btn add-to-cart"> 장바구니에 추가</button>
                <button class="btn add-to-wishlist"> 찜하기</button>
            </div>

            <div class="details">
                <h3>상품 정보</h3>
                <ul>
                    <li>원산지: 국내산</li>
                    <li>중량: 250g</li>
                    <li>보관 방법: 냉장 보관</li>
                    <li>배송 방법: 신선배송</li>
                </ul>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-box">
            <P>경남정보대학교</P>
            <div class="social">
                <img src="../image/페이스북.png" alt="">
                <img src="../image/트위터.png" alt="">
                <img src="../image/인스타그램.png" alt="">
                <img src="../image/유튜브.png" alt="">
            </div>
        </div>
    </footer>

    <div class="copyright">
        <p>Copyright © MS농장. All Rights Reserved.</p>
    </div>
</body>
</html>
