<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="./css/singin.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>
<body> 
    <div class="main-container">
		<div class="main-wrap">
		<header>
			<div class="logo-wrap">
				<img src="./image/농부.png">
			</div>
		</header>
		<section class="login-input-section-wrap">
			<div class="login-input-wrap">	
				<input placeholder="아이디 또는 전화번호" type="text"></input>
			</div>
			<div class="login-input-wrap password-wrap">	
				<input placeholder="비밀번호" type="password"></input>
			</div>
			<div class="login-button-wrap">
				<button>로그인</button>
			</div>
			<div class="login-stay-sign-in">
				<i class="far fa-check-circle"></i>
				<span>로그인 상태 유지</span>
			</div>
		</section>
		<section class="Easy-sgin-in-wrap">
			<h2>다른 방법으로 로그인</h2>
			<ul class="sign-button-list">
				<li><button><img src="./image/qr코드.png"><span>QR코드</span></button></li>
				<li><button><img src="./image/구글로그인.png"></i><span>Google로 로그인</span></button></li>
				<li><button><img src="./image/애플로그인.png"></i><span>Apple로 로그인</span></button></li>
			</ul>
			<p class="forget-msg">비밀번호 찾기 | 아이디 찾기 | 회원가입</p>
		</section>
        <footer>
			<div class="copyright-wrap">
			<span>Copyright © MS농장. All Rights Reserved.</span>
			</div>
		</footer>
		</div>
	</div>
</body>
</html>
